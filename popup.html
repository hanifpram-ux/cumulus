<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      background: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #27272a;
    }
    .header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.025em; }
    .version {
      font-size: 11px;
      color: #a1a1aa;
      background: #27272a;
      padding: 2px 8px;
      border-radius: 9999px;
      font-weight: 500;
    }
    .logo {
      width: 24px; height: 24px;
      background: #fafafa;
      color: #09090b;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .btn {
      width: 100%;
      padding: 0;
      height: 36px;
      background: #fafafa;
      color: #09090b;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #e4e4e7; }
    .desc {
      margin-top: 12px;
      font-size: 12px;
      color: #a1a1aa;
      line-height: 1.6;
      text-align: center;
    }
    .protocols {
      margin-top: 8px;
      font-size: 10px;
      color: #3f3f46;
      text-align: center;
      line-height: 1.5;
    }
    .credit {
      margin-top: 12px;
      font-size: 10px;
      color: #3f3f46;
      text-align: center;
      padding-top: 10px;
      border-top: 1px solid #27272a;
    }
    .credit a {
      color: #a1a1aa;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .credit a:hover { color: #fafafa; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">&#9729;</div>
    <h1>Cumulus</h1>
    <span class="version">v2.0</span>
  </div>
  <button class="btn" id="open-btn">Open Cumulus</button>
  <p class="desc">Multi-protocol cloud storage manager.<br>R2, S3, B2, GCS, WebDAV & more.</p>
  <p class="protocols">S3 &bull; R2 &bull; B2 &bull; GCS &bull; Wasabi &bull; DO Spaces &bull; MinIO &bull; WebDAV</p>
  <p class="credit">Made with &hearts; by <a href="https://hanifprm.my.id" target="_blank">Hanif Pramono</a> &bull; <a href="https://github.com/hanifpram-ux/cumulus" target="_blank">GitHub</a></p>
  <script src="popup.js"></script>
</body>
</html>
